server.port=8082

spring.application.name=config-server
spring.cloud.config.enabled=false
spring.cloud.config.server.git.uri=git@gh_personal:ppalazzi/config-server-apps.git
spring.cloud.config.server.git.ignore-local-ssh-settings=false

# Configuraciˇn de Eureka Client para que el Config Server se registre
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
